<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="서명 진행 현황 — 누가 서명했는지 확인하고 최종 PDF를 받으세요.">
  <title>서명 진행 현황</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M9 22l2.5-1L22 10.5c.5-.5.5-1.3 0-1.8l-.7-.7c-.5-.5-1.3-.5-1.8 0L9 19.5 8 24l4-2z' fill='%236366f1'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">✍</div>
        <span class="brand-name">서명 진행 현황</span>
      </div>
      <div class="topbar-actions">
        <button class="chip-btn primary" id="downloadButton" type="button" disabled>최종 PDF 다운로드</button>
      </div>
    </header>

    <main class="workspace">
      <div class="workspace-header">
        <div class="doc-info">
          <span id="docName" class="doc-name">불러오는 중…</span>
        </div>
        <div class="workspace-header-right">
          <span id="overallProgress" class="status-text"></span>
        </div>
      </div>
      <div class="status-body" id="statusBody">
        <p class="modal-hint" id="statusMessage">진행 현황을 불러오는 중…</p>
      </div>
    </main>
  </div>

  <footer class="app-footer">
    <span>© 2026 서울신답초등학교 정용석</span>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="./firebase-init.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="./status.js"></script>
</body>

</html>
